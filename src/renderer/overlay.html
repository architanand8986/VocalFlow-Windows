<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline';">
  <title>VocalFlow Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 220px;
      height: 56px;
      overflow: hidden;
      background: transparent;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(20, 20, 32, 0.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 0 18px;
      height: 52px;
      width: 220px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
      font-size: 13px;
      font-weight: 500;
    }

    /* Animated microphone bars (recording state) */
    .bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 20px;
      flex-shrink: 0;
    }
    .bar {
      width: 3px;
      background: #f38ba8;
      border-radius: 2px;
      animation: bounce 0.8s ease-in-out infinite;
    }
    .bar:nth-child(1) { animation-delay: 0s;    animation-duration: 0.6s; }
    .bar:nth-child(2) { animation-delay: 0.1s;  animation-duration: 0.8s; }
    .bar:nth-child(3) { animation-delay: 0.2s;  animation-duration: 0.7s; }
    .bar:nth-child(4) { animation-delay: 0.05s; animation-duration: 0.9s; }

    @keyframes bounce {
      0%, 100% { height: 4px; }
      50%       { height: 18px; }
    }

    /* Spinner (transcribing state) */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fab387;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .label { flex: 1; }
    .label-sub { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 1px; }
  </style>
</head>
<body>
  <div class="pill" id="pill">
    <div class="bars" id="indicator">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div class="label">
      <div id="mainLabel">Recording</div>
      <div class="label-sub" id="subLabel">Press hotkey to stop</div>
    </div>
  </div>

  <script>
    /* global api */
    api.on('set-state', (state) => {
      const indicator = document.getElementById('indicator');
      const mainLabel = document.getElementById('mainLabel');
      const subLabel  = document.getElementById('subLabel');

      if (state === 'recording') {
        indicator.innerHTML = `
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>`;
        mainLabel.textContent = 'Recording';
        mainLabel.style.color = '#f38ba8';
        subLabel.textContent = 'Press hotkey to stop';
      } else if (state === 'transcribing') {
        indicator.innerHTML = '<div class="spinner"></div>';
        mainLabel.textContent = 'Transcribing…';
        mainLabel.style.color = '#fab387';
        subLabel.textContent = 'Please wait';
      }
    });
  </script>
</body>
</html>
